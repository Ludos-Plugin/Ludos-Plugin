version: '3'

services:
  plugin:
    container_name: ludos-plugin
    build:
      context: ./plugin
      dockerfile: Dockerfile
    volumes:
      - ./plugin:/plugin
      - ./data/plugins:/output

  server:
    container_name: ludos-server
    image: itzg/minecraft-server:java17-jdk
    tty: true
    stdin_open: true
    ports:
      - "25565:25565"
    environment:
      EULA: "TRUE"
      TYPE: "PAPER"
      VERSION: "1.19"
    volumes:
      - ./data:/data
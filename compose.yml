services:
  server:
    container_name: ludos-server
    image: itzg/minecraft-server:stable-java17
    tty: true
    stdin_open: true
    ports:
      - "25565:25565"
      - "8080:8080"
    environment:
      EULA: "TRUE"
      TYPE: "PAPER"
      VERSION: "1.19"
      MEMORY: "6144M"
    volumes:
      - ./data:/data
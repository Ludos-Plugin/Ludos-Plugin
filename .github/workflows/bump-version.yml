name: Bump Project Version

on:
  workflow_dispatch:
    inputs:
      bump-version:
        description: 'Bump version before tagging?'
        required: true
        default: true
        type: boolean
      bump-type:
        description: 'Bump Type (patch, minor, major)'
        required: false
        default: 'patch'
        type: choice
        options:
          - patch
          - minor
          - major

jobs:
  tag-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      new-version: ${{ steps.version_logic.outputs.version }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Calculate Version
        id: version_logic
        run: |
          CURRENT=$(./gradlew -q printVersion)
          if [ "${{ inputs.bump-version }}" == "true" ]; then
            # Bump Logic
            IFS='.' read -r MAJOR MINOR PATCH <<< "$CURRENT"
            if [ "${{ inputs.bump-type }}" == "major" ]; then
              NEW="$((MAJOR + 1)).0.0"
            elif [ "${{ inputs.bump-type }}" == "minor" ]; then
              NEW="$MAJOR.$((MINOR + 1)).0"
            else
              NEW="$MAJOR.$MINOR.$((PATCH + 1))"
            fi
            echo "VERSION=$NEW" >> $GITHUB_OUTPUT
            echo "ACTION=bump" >> $GITHUB_OUTPUT
          else
            echo "VERSION=$CURRENT" >> $GITHUB_OUTPUT
            echo "ACTION=keep" >> $GITHUB_OUTPUT
          fi

      - name: Bump Version and Commit
        if: steps.version_logic.outputs.ACTION == 'bump'
        run: |
          NEW=${{ steps.version_logic.outputs.VERSION }}
          sed -i -E "s/(version['\"]?[ ]*=[ ]*['\"]?)[0-9.]+(['\"]?)/\1$NEW\2/" build.gradle
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git commit -am "Bump version to $NEW [skip ci]"
          git tag "v$NEW"
          git push --follow-tags

      - name: Tag Current Version
        if: steps.version_logic.outputs.ACTION == 'keep'
        run: |
          CURRENT=${{ steps.version_logic.outputs.VERSION }}
          # Check if tag already exists to avoid errors on re-run
          if ! git rev-parse "v$CURRENT" >/dev/null 2>&1; then
            git tag "v$CURRENT"
            git push origin "v$CURRENT"
          else
            echo "Tag v$CURRENT already exists. Triggering release."
            # Force push tag to trigger workflow if it exists but release failed
            git tag -f "v$CURRENT"
            git push -f origin "v$CURRENT"
          fi   
name: Bump Project Version

on:
  workflow_dispatch:
    inputs:
      bump-version:
        description: 'Bump version before tagging?'
        required: true
        default: true
        type: boolean
      bump-type:
        description: 'Bump Type (patch, minor, major)'
        required: false
        default: 'patch'
        type: choice
        options:
          - patch
          - minor
          - major

jobs:
  tag-and-trigger:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      actions: write
    outputs:
      new-version: ${{ steps.version_logic.outputs.version }}
    defaults:
      run:
        working-directory: ./plugin
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Calculate Version
        id: version_logic
        run: |
          CURRENT=$(./gradlew -q printVersion)
          if [ "${{ inputs.bump-version }}" == "true" ]; then
            IFS='.' read -r MAJOR MINOR PATCH <<< "$CURRENT"
            if [ "${{ inputs.bump-type }}" == "major" ]; then
              NEW="$((MAJOR + 1)).0.0"
            elif [ "${{ inputs.bump-type }}" == "minor" ]; then
              NEW="$MAJOR.$((MINOR + 1)).0"
            else
              NEW="$MAJOR.$MINOR.$((PATCH + 1))"
            fi
            echo "VERSION=$NEW" >> $GITHUB_OUTPUT
            echo "ACTION=bump" >> $GITHUB_OUTPUT
          else
            echo "VERSION=$CURRENT" >> $GITHUB_OUTPUT
            echo "ACTION=keep" >> $GITHUB_OUTPUT
          fi

      - name: Bump Version and Push Tag
        if: steps.version_logic.outputs.ACTION == 'bump'
        run: |
          NEW=${{ steps.version_logic.outputs.VERSION }}
          sed -i -E "s/(version['\"]?[ ]*=[ ]*['\"]?)[0-9.]+(['\"]?)/\1$NEW\2/" build.gradle
          git commit -am "Bump version to $NEW"
          
          git tag "v$NEW"
          git push --follow-tags

      - name: Tag Current Version
        if: steps.version_logic.outputs.ACTION == 'keep'
        run: |
          CURRENT=${{ steps.version_logic.outputs.VERSION }}
          if ! git rev-parse "v$CURRENT" >/dev/null 2>&1; then
            git tag "v$CURRENT"
            git push origin "v$CURRENT"
          else
            echo "Tag exists, forcing update to trigger workflow"
            git tag -f "v$CURRENT"
            git push -f origin "v$CURRENT"
          fi
    
      - name: Dispatch release workflow
        run: |
          VERSION=${{ steps.version_logic.outputs.version }}
          echo "Triggering release for v$VERSION"
          gh workflow run release.yml --ref "v$VERSION"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
name: Build and Release Ludos Plugin

on:
  push:
    tags:
      - 'v*'

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v6

      - name: Extract Version from Gradle
        id: get_version
        run: |
          # Strip 'v' prefix from tag if necessary, or read directly from gradle
          echo "VERSION=$(./plugin/gradlew -q printVersion)" >> $GITHUB_OUTPUT

      - name: Build with Gradle
        run: ./plugin/gradlew build

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.get_version.outputs.VERSION }}
          name: Release ${{ steps.get_version.outputs.VERSION }}
          body: |
            Automated release for version ${{ steps.get_version.outputs.VERSION }}
          files: plugin/build/output/*.jar
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}